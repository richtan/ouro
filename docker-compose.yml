services:
  postgres:
    image: postgres:16
    volumes:
      - ./db/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ouro
      POSTGRES_USER: ouro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: ["${DB_EXPOSE_PORT:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ouro"]
      interval: 5s
      retries: 5

  agent:
    build: ./agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - BASE_RPC_URL
      - CHAIN_ID
      - CHAIN_CAIP2
      - WALLET_PRIVATE_KEY
      - WALLET_ADDRESS
      - PROOF_CONTRACT_ADDRESS
      - USDC_CONTRACT_ADDRESS
      - BUILDER_CODE
      - SLURMREST_URL
      - SLURMREST_JWT
      - LLM_MODEL
      - OPENAI_API_KEY
      - CDP_API_KEY_ID
      - CDP_API_KEY_SECRET
      - X402_FACILITATOR_URL
      - PRICE_MARGIN_MULTIPLIER
      - ADMIN_API_KEY
      - PUBLIC_API_URL
      - PUBLIC_DASHBOARD_URL
    ports: ["${AGENT_PORT:-8000}:8000"]

  dashboard:
    build: ./dashboard
    depends_on: [agent]
    environment:
      AGENT_URL: http://agent:8000
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    ports: ["${DASHBOARD_PORT:-3000}:3000"]

volumes:
  pgdata:
