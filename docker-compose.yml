services:
  postgres:
    image: postgres:16
    volumes:
      - ./db/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ouro
      POSTGRES_USER: ouro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ouro"]
      interval: 5s
      retries: 5

  agent:
    build: ./agent
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports: ["8000:8000"]

  dashboard:
    build: ./dashboard
    depends_on: [agent]
    environment:
      AGENT_URL: http://agent:8000
    ports: ["3000:3000"]

volumes:
  pgdata:
