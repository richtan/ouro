ClusterName=ouro
SlurmctldHost=ouro-slurm

MpiDefault=none
ProctrackType=proctrack/cgroup
ReturnToService=2
SlurmctldPidFile=/run/slurmctld.pid
SlurmdPidFile=/run/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
StateSaveLocation=/var/spool/slurmctld
SlurmUser=slurm

SchedulerType=sched/backfill
SelectType=select/cons_tres

AuthType=auth/munge
AuthAltTypes=auth/jwt
AuthAltParameters=jwt_key=/etc/slurm/jwt_hs256.key

AccountingStorageType=accounting_storage/none
JobAcctGatherType=jobacct_gather/none

# Permanent nodes
NodeName=ouro-slurm    CPUs=2 RealMemory=1500  State=UNKNOWN
NodeName=ouro-worker-1 CPUs=2 RealMemory=3500  State=UNKNOWN
NodeName=ouro-worker-2 CPUs=2 RealMemory=3500  State=UNKNOWN

# Elastic spot nodes (State=FUTURE = invisible to scheduler until agent provisions them)
NodeName=ouro-spot-sm-[1-10] CPUs=2  RealMemory=3500   State=FUTURE
NodeName=ouro-spot-md-[1-5]  CPUs=4  RealMemory=15000  State=FUTURE
NodeName=ouro-spot-lg-[1-3]  CPUs=8  RealMemory=30000  State=FUTURE

PartitionName=compute Nodes=ouro-slurm,ouro-worker-[1-2],ouro-spot-sm-[1-10],ouro-spot-md-[1-5],ouro-spot-lg-[1-3] Default=YES MaxTime=60 State=UP

# Cloud node support (agent-managed, not Slurm power-saving)
ResumeTimeout=180

