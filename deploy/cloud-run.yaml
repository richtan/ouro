# GCP Cloud Run service configuration for Ouro
# Deploy: gcloud run services replace deploy/cloud-run.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ouro-dashboard
spec:
  template:
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/ouro-dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: AGENT_URL
              value: https://ouro-agent-HASH.a.run.app
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ouro-agent
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/ouro-agent:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ouro-secrets
          resources:
            limits:
              memory: 1Gi
              cpu: "2"
