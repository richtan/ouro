name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy-agent:
    name: Deploy agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - run: railway up agent --detach --service agent
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-dashboard:
    name: Deploy dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - run: railway up dashboard --detach --service dashboard
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-mcp:
    name: Deploy mcp-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - run: railway up mcp-server --detach --service mcp-server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
