name: Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-agent:
    name: Test agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml
      - run: pip install -e ".[test]"
        working-directory: agent
      - run: python -m pytest tests/ -v --tb=short
        working-directory: agent

  deploy-agent:
    name: Deploy agent
    needs: [test-agent]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up agent --path-as-root --detach --service agent

  deploy-dashboard:
    name: Deploy dashboard
    needs: [test-agent]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up dashboard --path-as-root --detach --service dashboard

  deploy-mcp:
    name: Deploy mcp-server
    needs: [test-agent]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up mcp-server --path-as-root --detach --service mcp-server
