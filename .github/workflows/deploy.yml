name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy-agent:
    name: Deploy agent
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up agent --path-as-root --detach --service agent

  deploy-dashboard:
    name: Deploy dashboard
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up dashboard --path-as-root --detach --service dashboard

  deploy-mcp:
    name: Deploy mcp-server
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up mcp-server --path-as-root --detach --service mcp-server
